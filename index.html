<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathSolver Expert - 3r ESO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        input, select { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        .results-wrapper { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 800px) { .results-wrapper { grid-template-columns: 1fr; } }
        .chart-container { height: 350px; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 10px;}
        th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        th { background: #f8fafc; }
        .badge { display: inline-block; padding: 4px 8px; background: #dbeafe; color: #1e40af; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
        .func-text { font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; color: #2563eb; font-weight: bold; padding: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>📐 Generador de Funcions 3r ESO</h2>
    
    <div class="card">
        <div class="grid-inputs">
            <div class="input-group">
                <label>Tipus de funció</label>
                <select id="funcType" onchange="toggleInputs()">
                    <option value="lineal">Lineal (y = mx + n)</option>
                    <option value="quadratica">Quadràtica (ax² + bx + c)</option>
                </select>
            </div>
            <div id="linealSubtype" class="input-group">
                <label>Dades inicials</label>
                <select id="linealMode" onchange="toggleInputs()">
                    <option value="mn">M i N directes</option>
                    <option value="punts">Càlcul per 2 punts</option>
                </select>
            </div>
        </div>

        <div id="inputsMN" class="grid-inputs">
            <input type="number" id="m" placeholder="m (pendent)">
            <input type="number" id="n" placeholder="n (ordenada)">
        </div>

        <div id="inputsPunts" class="grid-inputs" style="display:none;">
            <input type="number" id="x1" placeholder="x1"> <input type="number" id="y1" placeholder="y1">
            <input type="number" id="x2" placeholder="x2"> <input type="number" id="y2" placeholder="y2">
        </div>

        <div id="inputsQuad" class="grid-inputs" style="display:none;">
            <input type="number" id="a" placeholder="a (x²)">
            <input type="number" id="b" placeholder="b (x)">
            <input type="number" id="c" placeholder="terme c">
        </div>

        <button onclick="executarCalcul()">Resoldre i Dibuixar</button>
    </div>

    <div class="results-wrapper" id="output" style="display:none;">
        <div class="card">
            <h3>📝 Anàlisi de la Gràfica</h3>
            <div id="infoResum"></div>
            <h4>📌 Taula de Valors</h4>
            <table id="valTable">
                <thead><tr><th>x</th><th>f(x)</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="card">
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let myChart = null;

function toggleInputs() {
    const type = document.getElementById('funcType').value;
    const mode = document.getElementById('linealMode').value;
    document.getElementById('linealSubtype').style.display = type === 'lineal' ? 'flex' : 'none';
    document.getElementById('inputsMN').style.display = (type === 'lineal' && mode === 'mn') ? 'grid' : 'none';
    document.getElementById('inputsPunts').style.display = (type === 'lineal' && mode === 'punts') ? 'grid' : 'none';
    document.getElementById('inputsQuad').style.display = type === 'quadratica' ? 'grid' : 'none';
}

function formatEquacio(a, b, c, isQuad) {
    if (!isQuad) {
        let m = a, n = b;
        if (m === 0 && n === 0) return "y = 0";
        let res = "y = ";
        if (m !== 0) {
            res += (m === 1 ? "x" : m === -1 ? "-x" : m.toFixed(2) + "x");
        }
        if (n !== 0) {
            if (m !== 0) res += (n > 0 ? " + " : " - ");
            else if (n < 0) res += "-";
            res += Math.abs(n).toFixed(2);
        }
        return res;
    } else {
        let res = "y = " + (a === 1 ? "x²" : a === -1 ? "-x²" : a.toFixed(2) + "x²");
        if (b !== 0) {
            res += (b > 0 ? " + " : " - ") + (Math.abs(b) === 1 ? "x" : Math.abs(b).toFixed(2) + "x");
        }
        if (c !== 0) {
            res += (c > 0 ? " + " : " - ") + Math.abs(c).toFixed(2);
        }
        return res;
    }
}

function executarCalcul() {
    const type = document.getElementById('funcType').value;
    let formula, equacioLabel, badgeLabel;
    let puntsClau = [];
    let dadesExtra = "";

    if (type === 'lineal') {
        let m, n;
        if (document.getElementById('linealMode').value === 'mn') {
            m = parseFloat(document.getElementById('m').value) || 0;
            n = parseFloat(document.getElementById('n').value) || 0;
        } else {
            const x1 = parseFloat(document.getElementById('x1').value), y1 = parseFloat(document.getElementById('y1').value);
            const x2 = parseFloat(document.getElementById('x2').value), y2 = parseFloat(document.getElementById('y2').value);
            if (x1 === x2) return alert("Error: x1 i x2 són iguals.");
            m = (y2 - y1) / (x2 - x1);
            n = y1 - (m * x1);
        }
        formula = x => m*x + n;
        equacioLabel = formatEquacio(m, n, 0, false);
        badgeLabel = "Lineal";
        
        const tallX = m !== 0 ? -n/m : 0;
        puntsClau = [tallX - 2, tallX - 1, tallX, tallX + 1, tallX + 2];
        dadesExtra = `<b>Tall Eix X:</b> (${tallX.toFixed(2)}, 0)<br><b>Tall Eix Y:</b> (0, ${n.toFixed(2)})`;

    } else {
        const a = parseFloat(document.getElementById('a').value) || 0;
        const b = parseFloat(document.getElementById('b').value) || 0;
        const c = parseFloat(document.getElementById('c').value) || 0;
        if (a === 0) return alert("En una quadràtica, 'a' no pot ser 0.");
        
        formula = x => a*x**2 + b*x + c;
        equacioLabel = formatEquacio(a, b, c, true);
        badgeLabel = "Quadràtica";

        const vx = -b / (2 * a), vy = formula(vx);
        const disc = b*b - 4*a*c;
        puntsClau = [vx - 2, vx - 1, vx, vx + 1, vx + 2];
        let tallsXText = "No en té";
        if (disc >= 0) {
            const x1 = (-b + Math.sqrt(disc)) / (2*a);
            const x2 = (-b - Math.sqrt(disc)) / (2*a);
            puntsClau.push(x1, x2);
            tallsXText = disc === 0 ? `(${x1.toFixed(2)}, 0)` : `(${x1.toFixed(2)}, 0) i (${x2.toFixed(2)}, 0)`;
        }
        dadesExtra = `<b>Vèrtex:</b> (${vx.toFixed(2)}, ${vy.toFixed(2)})<br><b>Tall Eix X:</b> ${tallsXText}<br><b>Tall Eix Y:</b> (0, ${c.toFixed(2)})`;
    }

    // Netejar i ordenar valors de X
    const xVals = [...new Set(puntsClau)].sort((a,b) => a-b);
    const yVals = xVals.map(x => formula(x));
    
    // Càlcul Domini i Recorregut basat EN LA TAULA
    const dominiMin = Math.min(...xVals).toFixed(2);
    const dominiMax = Math.max(...xVals).toFixed(2);
    const recMin = Math.min(...yVals).toFixed(2);
    const recMax = Math.max(...yVals).toFixed(2);

    const infoHTML = `
        <span class="badge">${badgeLabel}</span><br>
        <div class="func-text">${equacioLabel}</div><br>
        ${dadesExtra}<br>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <b>Domini (en gràfica):</b> [${dominiMin}, ${dominiMax}]<br>
        <b>Recorregut (en gràfica):</b> [${recMin}, ${recMax}]
    `;

    mostrarResultats(xVals, yVals, infoHTML);
}

function mostrarResultats(xVals, yVals, info) {
    document.getElementById('infoResum').innerHTML = info;
    document.getElementById('output').style.display = 'grid';
    
    const tbody = document.querySelector('#valTable tbody');
    tbody.innerHTML = xVals.map((x, i) => `<tr><td>${x.toFixed(2)}</td><td>${yVals[i].toFixed(2)}</td></tr>`).join('');

    const ctx = document.getElementById('myChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: xVals.map(x => x.toFixed(1)),
            datasets: [{
                label: 'f(x)',
                data: yVals,
                borderColor: '#2563eb',
                tension: 0.3,
                fill: false,
                pointRadius: 5,
                pointHoverRadius: 7
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: 'Eix X' } },
                y: { title: { display: true, text: 'Eix Y' } }
            }
        }
    });
}

toggleInputs();
</script>
</body>
</html>
